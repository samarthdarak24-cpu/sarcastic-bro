<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Login Debug</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-family: monospace;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
            transition: all 0.3s;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .log {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Buyer Login Debugger</h1>
        
        <div id="status"></div>
        
        <div>
            <button onclick="checkCurrentState()">Check Current State</button>
            <button onclick="clearAndLogin()">Clear & Login as Buyer</button>
            <button onclick="goToDashboard()">Go to Buyer Dashboard</button>
            <button onclick="clearStorage()">Clear Storage</button>
        </div>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function checkCurrentState() {
            log('=== Checking Current State ===');
            
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            const refreshToken = localStorage.getItem('refreshToken');
            
            log(`Token exists: ${!!token}`);
            log(`User exists: ${!!user}`);
            log(`Refresh token exists: ${!!refreshToken}`);
            
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    log(`User data: ${JSON.stringify(userData, null, 2)}`);
                    log(`User role: ${userData.role}`);
                    log(`User name: ${userData.name}`);
                    log(`User email: ${userData.email}`);
                    
                    if (userData.role === 'BUYER') {
                        showStatus('✅ You are logged in as a BUYER', 'success');
                    } else {
                        showStatus(`⚠️ You are logged in as ${userData.role}, not BUYER`, 'error');
                    }
                } catch (e) {
                    log(`Error parsing user data: ${e.message}`);
                    showStatus('❌ Invalid user data in localStorage', 'error');
                }
            } else {
                showStatus('❌ No user data found - not logged in', 'error');
            }
            
            log(`Current URL: ${window.location.href}`);
            log(`Current pathname: ${window.location.pathname}`);
        }

        async function clearAndLogin() {
            log('=== Starting Fresh Login ===');
            
            // Clear everything
            localStorage.clear();
            sessionStorage.clear();
            log('✅ Cleared all storage');
            
            // Login credentials
            const email = 'buyer@test.com';
            const password = 'Farmer123';
            
            log(`Attempting login with: ${email}`);
            
            try {
                const response = await fetch('http://localhost:3001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                log(`Response status: ${response.status}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    log(`❌ Login failed: ${errorText}`, 'error');
                    showStatus('❌ Login failed - check console', 'error');
                    return;
                }
                
                const data = await response.json();
                log(`Response data: ${JSON.stringify(data, null, 2)}`);
                
                // Extract token and user
                const token = data.tokens?.accessToken || data.token;
                const user = data.user;
                const refreshToken = data.tokens?.refreshToken;
                
                if (!token || !user) {
                    log('❌ Missing token or user in response');
                    showStatus('❌ Invalid response from server', 'error');
                    return;
                }
                
                // Store in localStorage
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));
                if (refreshToken) {
                    localStorage.setItem('refreshToken', refreshToken);
                }
                
                log('✅ Stored token and user data');
                log(`User role: ${user.role}`);
                
                if (user.role === 'BUYER') {
                    showStatus('✅ Login successful! Redirecting to buyer dashboard...', 'success');
                    log('Redirecting to /buyer/dashboard in 2 seconds...');
                    setTimeout(() => {
                        window.location.href = '/buyer/dashboard';
                    }, 2000);
                } else {
                    showStatus(`⚠️ Logged in as ${user.role}, not BUYER`, 'error');
                }
                
            } catch (error) {
                log(`❌ Error during login: ${error.message}`);
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }

        function goToDashboard() {
            log('=== Navigating to Buyer Dashboard ===');
            const user = localStorage.getItem('user');
            
            if (!user) {
                showStatus('❌ Not logged in - please login first', 'error');
                return;
            }
            
            try {
                const userData = JSON.parse(user);
                if (userData.role !== 'BUYER') {
                    showStatus(`⚠️ You are ${userData.role}, not BUYER`, 'error');
                    return;
                }
            } catch (e) {
                showStatus('❌ Invalid user data', 'error');
                return;
            }
            
            log('Navigating to /buyer/dashboard...');
            window.location.href = '/buyer/dashboard';
        }

        function clearStorage() {
            log('=== Clearing Storage ===');
            localStorage.clear();
            sessionStorage.clear();
            log('✅ All storage cleared');
            showStatus('✅ Storage cleared', 'success');
        }

        // Auto-check on load
        window.onload = () => {
            log('Page loaded');
            checkCurrentState();
        };
    </script>
</body>
</html>

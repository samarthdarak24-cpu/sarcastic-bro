# Simple CI/CD for ODOP Connect - Focused on Build Success
name: ODOP Connect - Simple CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Backend Build
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

  # Frontend Build
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:4000

  # AI Service Check
  ai-service-check:
    name: AI Service Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify FastAPI
        run: python -c "from main import app; print('✓ FastAPI app loaded')"

  # Success Summary
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, ai-service-check]
    steps:
      - name: Success
        run: |
          echo "✅ All builds successful!"
          echo "Backend: Built"
          echo "Frontend: Built"
          echo "AI Service: Verified"

# ========================================================================
#  Kubernetes Deployment — ODOP Connect Backend
#  Horizontal Pod Autoscaler + Resource Limits + Health Checks
# ========================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: odop-backend
  namespace: odop
  labels:
    app: odop-backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: odop-backend
  template:
    metadata:
      labels:
        app: odop-backend
        tier: api
    spec:
      containers:
        - name: backend
          image: ghcr.io/odop-connect/backend:latest
          ports:
            - containerPort: 4000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: odop-secrets
                  key: database-url
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: odop-secrets
                  key: jwt-access-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: odop-secrets
                  key: jwt-refresh-secret
            - name: BLOCKCHAIN_RPC_URL
              value: "https://sepolia.infura.io/v3/YOUR_KEY"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: odop-backend-svc
  namespace: odop
spec:
  selector:
    app: odop-backend
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: odop-backend-hpa
  namespace: odop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: odop-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ========================================================================
#  Kubernetes Deployment — ODOP Connect Frontend
# ========================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: odop-frontend
  namespace: odop
  labels:
    app: odop-frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: odop-frontend
  template:
    metadata:
      labels:
        app: odop-frontend
        tier: web
    spec:
      containers:
        - name: frontend
          image: ghcr.io/odop-connect/frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: odop-frontend-svc
  namespace: odop
spec:
  selector:
    app: odop-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

---
# ========================================================================
#  Ingress — Route traffic to frontend and backend
# ========================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: odop-ingress
  namespace: odop
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - odopconnect.in
        - api.odopconnect.in
      secretName: odop-tls
  rules:
    - host: odopconnect.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: odop-frontend-svc
                port:
                  number: 3000
    - host: api.odopconnect.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: odop-backend-svc
                port:
                  number: 4000

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Live Mandi Prices</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-ticker {
            animation: ticker 30s linear infinite;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold mb-6">Live Mandi Price Ticker Test</h1>
        
        <!-- Live Price Ticker -->
        <div class="w-full bg-white border-b border-gray-200 shadow-md rounded-lg overflow-hidden">
            <div class="flex items-center">
                <!-- Label -->
                <div class="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white shrink-0">
                    <svg class="w-3 h-3 animate-pulse" fill="currentColor" viewBox="0 0 20 20">
                        <circle cx="10" cy="10" r="8"/>
                    </svg>
                    <span class="text-xs font-black uppercase tracking-widest">LIVE MANDI</span>
                    <div class="h-1.5 w-1.5 rounded-full bg-emerald-300 animate-pulse"></div>
                </div>

                <!-- Scrolling ticker -->
                <div class="flex-1 overflow-hidden relative">
                    <div class="flex animate-ticker" id="ticker">
                        <!-- Prices will be inserted here -->
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Status</h2>
            <div id="status" class="space-y-2">
                <p>✅ Ticker animation: <span class="font-mono text-green-600">Running</span></p>
                <p>✅ Price updates: <span class="font-mono text-green-600" id="update-status">Active</span></p>
                <p>📊 Last update: <span class="font-mono" id="last-update">-</span></p>
            </div>
        </div>
    </div>

    <script>
        const CROPS = [
            { id: "tomato", name: "Tomato", price: 28 },
            { id: "wheat", name: "Wheat", price: 42 },
            { id: "rice", name: "Rice", price: 88 },
            { id: "onion", name: "Onion", price: 35 },
            { id: "potato", name: "Potato", price: 22 },
            { id: "chilli", name: "Chilli", price: 140 },
            { id: "turmeric", name: "Turmeric", price: 120 },
            { id: "ginger", name: "Ginger", price: 95 },
        ];

        let currentPrices = { ...CROPS.reduce((acc, c) => ({ ...acc, [c.id]: c.price }), {}) };

        function renderTicker() {
            const ticker = document.getElementById('ticker');
            const items = CROPS.map(crop => {
                const price = currentPrices[crop.id] || crop.price;
                return `
                    <div class="flex items-center gap-2 px-4 py-1.5 rounded-lg shrink-0">
                        <span class="text-xs font-black text-gray-900 uppercase tracking-wide">${crop.name}</span>
                        <span class="text-sm font-black text-emerald-700 tabular-nums">₹${price.toFixed(1)}</span>
                        <div class="w-px h-3 bg-gray-300 ml-1"></div>
                    </div>
                `;
            }).join('');
            
            // Duplicate for seamless loop
            ticker.innerHTML = items + items;
        }

        function updatePrices() {
            const cropIds = Object.keys(currentPrices);
            const randomCrop = cropIds[Math.floor(Math.random() * cropIds.length)];
            const prev = currentPrices[randomCrop];
            const delta = (Math.random() - 0.48) * prev * 0.03;
            const newPrice = Math.max(prev + delta, prev * 0.85);
            currentPrices[randomCrop] = Math.round(newPrice * 10) / 10;
            
            renderTicker();
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }

        // Initial render
        renderTicker();
        
        // Update prices every 3 seconds
        setInterval(updatePrices, 3000);
        
        console.log('✅ Live Mandi Price Ticker initialized');
    </script>
</body>
</html>

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agritrust_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agrivoice
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: agritrust_api
    restart: always
    ports:
      - '3001:4000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agrivoice
      - PORT=4000
      - NODE_ENV=development
      - JWT_ACCESS_SECRET=your-super-secret-jwt-key-change-this-in-production-use-long-random-string
      - JWT_REFRESH_SECRET=your-super-secret-refresh-key-change-this-in-production-use-long-random-string
      - CORS_ORIGINS=http://localhost:3000
      - SOCKET_URL=http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: agritrust_web
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
      - NODE_ENV=development
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
